services:
  chorestar:
    image: ghcr.io/notfixingit3/chorestar:${CHORESTAR_TAG:?Set CHORESTAR_TAG to a published version}
    container_name: chorestar
    ports:
      - "8282:80"
    volumes:
      - ./data:/app/data
    networks:
      - groundzero
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  groundzero:
    external: true
    name: groundzero_lan
